# This file contains selected Kconfig options for the application.

CONFIG_SENSOR=y

# Bluetooth Stack Configuration
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="PSLabel"

# GATT Configuration
CONFIG_BT_GATT_CLIENT=y

# Bluetooth Controller - Extended Advertising (required for ESL/PAwR)
CONFIG_BT_CTLR_ADV_EXT=y

# Periodic Advertising with Responses (PAwR) - Core requirement for ESL
CONFIG_BT_CTLR_SYNC_PERIODIC=y
CONFIG_BT_PER_ADV_SYNC=y
CONFIG_BT_PER_ADV_SYNC_RSP=y

# ESL (Electronic Shelf Label) Profile
CONFIG_BT_ESL=y
